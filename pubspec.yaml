name: flutter_catelog_page
description: "A new Flutter project."


publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.12.2

#-----------/packages -------------#

dependencies:
  flutter:
    sdk: flutter

  # utility packages

  #Icons
  iconsax: ^0.0.8
  cupertino_icons: ^1.0.8

  #--- Statemanagement
  get: ^4.7.3

  #product sepcific




  #-----------/packages End -------------#
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  #-------------- Local assets: ---------#
  assets:
    - assets/Icons/
    - assets/Images/
    - assets/Videos/
    - assets/fonts/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 800
        - asset: assets/fonts/poppins-italic.ttf
          style: italic
        - asset: assets/fonts/poppins-semibold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-medium-italic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/Poppins-semibold-italic.ttf
          weight: 600
          style: italic